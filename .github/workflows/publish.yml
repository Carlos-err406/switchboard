name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      packages:
        description: "Packages to publish (comma-separated, or 'all')"
        required: true
        default: "all"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Determine packages to publish
        id: packages
        run: |
          if [ "${{ inputs.packages }}" = "all" ]; then
            echo "list=common js edge react" >> "$GITHUB_OUTPUT"
          else
            echo "list=$(echo '${{ inputs.packages }}' | tr ',' ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            cd packages/$pkg
            npm version ${{ inputs.bump }} --no-git-tag-version
            cd ../..
          done

      - name: Build packages
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            pnpm --filter "@switchboard/$pkg" build
          done

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            cd packages/$pkg
            pnpm publish --no-git-checks
            cd ../..
          done

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          VERSION=$(node -e "console.log(require('./packages/js/package.json').version)")
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags
